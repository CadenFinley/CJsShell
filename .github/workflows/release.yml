name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-package:
    name: Build and package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            preset: ci-linux-gcc-release
            target: linux-x86_64
          - os: macos-13
            preset: ci-macos-clang-release
            target: macos-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Configure CMake
        run: cmake --preset "${{ matrix.preset }}"

      - name: Build
        run: cmake --build --preset "${{ matrix.preset }}" --parallel

      - name: Run full shell integration suite
        run: ./tests/run_shell_tests.sh "build/${{ matrix.preset }}/cjsh"

      - name: Package release archive
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          package_root="dist/cjsh-${TAG}-${TARGET}"
          archive="dist/cjsh-${TAG}-${TARGET}.tar.gz"

          cmake --install "build/${{ matrix.preset }}" --prefix "${package_root}"
          cp LICENSE "${package_root}/LICENSE"
          cp README.md "${package_root}/README.md"

          tar -C dist -czf "${archive}" "cjsh-${TAG}-${TARGET}"
          shasum -a 256 "${archive}" > "${archive}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-and-package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release notes from changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import sys

          tag = os.environ["TAG"]
          version = tag[1:] if tag.startswith("v") else tag

          changelog_path = pathlib.Path("CHANGELOG.md")
          changelog_text = changelog_path.read_text(encoding="utf-8")
          changelog_lines = changelog_text.splitlines()

          heading_pattern = re.compile(rf"^##\\s+{re.escape(version)}(?:\\s*-\\s*.*)?\\s*$")

          start = None
          for index, line in enumerate(changelog_lines):
              if heading_pattern.match(line.strip()):
                  start = index
                  break

          if start is None:
              sys.exit(
                  f"Could not find a CHANGELOG.md section for version '{version}'. "
                  "Expected a heading like '## {version} - YYYY-MM-DD'."
              )

          end = len(changelog_lines)
          for index in range(start + 1, len(changelog_lines)):
              if changelog_lines[index].startswith("## "):
                  end = index
                  break

          section = changelog_lines[start:end]
          while section and not section[-1].strip():
              section.pop()

          release_notes = [f"# cjsh {tag}", ""]
          release_notes.extend(section)
          release_notes.append("")

          pathlib.Path("release-notes.md").write_text(
              "\n".join(release_notes),
              encoding="utf-8",
          )
          PY

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
