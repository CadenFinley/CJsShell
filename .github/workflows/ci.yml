name: CI Build and Test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC Release
            os: ubuntu-latest
            preset: ci-linux-gcc-release
          - name: macOS Clang Release
            os: macos-latest
            preset: ci-macos-clang-release
          - name: Linux Minimal Preset
            os: ubuntu-latest
            preset: minimal

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Run full shell integration suite
        run: ./tests/run_shell_tests.sh "build/${{ matrix.preset }}/cjsh"
